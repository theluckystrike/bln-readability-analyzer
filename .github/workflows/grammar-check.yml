name: Grammar Check
on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.mdx'

jobs:
  grammar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: theluckystrike/belikenative-grammar-check@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          severity-threshold: warning
          file-patterns: '**/*.md'
